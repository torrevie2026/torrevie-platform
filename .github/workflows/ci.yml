name: CI

on:
  pull_request:
  push:
    branches:
      - main

defaults:
  run:
    working-directory: torrevie-codex-package

jobs:
  platform-gate:
    name: Platform Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: torrevie-codex-package/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Start local Supabase
        run: pnpm supabase:start

      - name: Reset local Supabase schema
        run: pnpm supabase:reset

      - name: Tenant isolation gate
        run: pnpm test:isolation

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Stop local Supabase
        if: always()
        run: pnpm exec supabase stop --no-backup
